name: Bug report
description: Report a reproducible AI IME problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not paste API keys, full keyboard logs, or private input content.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest safe reproduction.
      placeholder: |
        1. Start AI IME with ...
        2. Type ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Windows version, Rime schema, AI IME version, provider type.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Paste only sanitized logs. Remove keys and private text.
